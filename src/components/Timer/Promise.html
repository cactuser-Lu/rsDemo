<script>
  const PENDING = "pending";
  const FULFILLED = "fulfilled";
  const REJECTED = "rejected";
  class MyPromise {
    constructor(executor) {
      this.onFulfilledCallbacks = [];
      this.onRejectedCallbacks = [];
      this.status = PENDING;
      this.value = undefined;
      this.reason = undefined;
      const resolve = (value) => {
        if (this.status === PENDING) {
          this.status = FULFILLED;
          this.value = value;
          queueMicrotask(() => this.onFulfilledCallbacks.forEach((fn) => fn()));
        }
      };
      const reject = (reason) => {
        if (this.status === PENDING) {
          this.status = REJECTED;
          this.reason = reason;
          queueMicrotask(() => this.onRejectedCallbacks.forEach((fn) => fn()));
        }
      };
      executor(resolve, reject);
    }
    //编写then方法
    then(onFulfilled, onRejected) {
      const promise2 = new MyPromise((resolve, reject) => {
        const handleCallback = (callback, value, resolve, reject) => {
          queueMicrotask(() => {
            try {
              const x = callback(value);
              resolvePromise(x,promise2, resolve, reject);
            } catch (error) {
              reject(error);
            }
          });
        };
        if (this.status === FULFILLED) {
          handleCallback(onFulfilled, this.value, resolve, reject);
        } else if (this.status === REJECTED) {
          handleCallback(onRejected, this.reason, resolve, reject);
        } else if (this.status === PENDING) {
          this.onFulfilledCallbacks.push(() =>
            handleCallback(onFulfilled, this.value, resolve, reject),
          );
          this.onRejectedCallbacks.push(() =>
            handleCallback(onRejected, this.reason, resolve, reject),
          );
        }
      });
      return promise2;
    }
  }
  // ==== 新增 ====
  function resolvePromise(x,promise2, resolve, reject) {
    // if (x === promise2) {
    //   return reject(new TypeError("Chaining cycle detected for promise"));
    // }
    if (x instanceof MyPromise) {
      x.then(resolve, reject);
    } else {
      resolve(x);
    }
  }
  const P = new MyPromise((resolve, reject) => {
    resolve(1);
  });
  const p1 = P.then((value) => {
    console.log(value);
    return p1;
  });

  p1.then((value) => {
    console.log(value);
  });
  console.log(p1)
</script>
